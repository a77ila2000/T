<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T우주 가족 바코드</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>T우주 가족 바코드</h1>
            <div id="warm-status-detail" class="warm-status-detail"></div>
        </header>

        <main id="card-container"></main>

        <div class="card links-card">
            <h3>바로가기</h3>
            <div class="links-container">
                <a href="https://m.tworld.co.kr/membership/benefit/brand" target="_blank">제휴 브랜드 확인</a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const accounts = [
                { user: '나', id: 'a77ila2000' },
                { user: '어머니', id: 'a77ila10004' },
                { user: '아버지', id: 'min560728' }
            ];

            const barcodeTypes = {
                universe: '우주바코드',
                general: '일반바코드'
            };

            const benefitsByType = {
                universe: {
                    a77ila2000: [
                        '파리바게뜨 30% 할인 / 월 3만원 한도'
                    ],
                    a77ila10004: [
                        '세븐일레븐 30% 할인 / 월 3만원 한도',
                        '투썸플레이스 30% 할인 / 월 3만원 한도',
                        'CU 편의점 20% 할인 / 월 3만원 한도'
                    ],
                    min560728: [
                        '파리바게뜨 30% 할인 / 월 3만원 한도',
                        'CU 편의점 20% 할인 / 월 3만원 한도'
                    ]
                },
                general: {
                    default: [
                        'T멤버십 일반 바코드',
                        'T멤버십 제휴처에서 할인 또는 적립 가능'
                    ]
                }
            };

            const cardContainer = document.getElementById('card-container');
            const BARCODE_VALID_TIME = 20 * 60;
            const CLIENT_WARM_INTERVAL_MS = 3 * 60 * 1000;
            const CACHE_REFRESH_INTERVAL_MS = 30 * 1000;
            const refreshQueue = [];
            const queuedKeys = new Set();
            const fetchingCards = new Set();
            let queueRunning = false;
            let warmWorkerRunning = false;
            let lastWarmStatusFetch = null;
            const lastKnownSuccessAt = {};

            accounts.forEach(account => {
                const card = document.createElement('div');
                card.className = 'card';
                card.id = `card-${account.id}`;
                card.dataset.currentType = 'universe';
                card.innerHTML = `
                    <div class="card-header">
                        <h2>${account.user}</h2>
                    </div>
                    <div class="barcode-actions">
                        <button class="btn type-btn active" data-id="${account.id}" data-type="universe">우주바코드</button>
                        <button class="btn type-btn secondary" data-id="${account.id}" data-type="general">일반바코드</button>
                    </div>
                    <div class="barcode-container">
                        <div class="barcode-placeholder">자동 갱신 대기 중입니다</div>
                        <div class="loader hidden"></div>
                        <img data-id="${account.id}" class="hidden" alt="${account.user} 바코드">
                    </div>
                    <div class="card-footer">
                        <div class="timer"></div>
                        <div class="status"></div>
                    </div>
                    <div class="benefit-box">
                        <div class="benefit-title">사용 가능 할인</div>
                        <ul class="benefit-list"></ul>
                    </div>
                `;
                cardContainer.appendChild(card);
                updateBenefits(account.id, 'universe');

                card.querySelectorAll('.type-btn').forEach(button => {
                    button.addEventListener('click', () => {
                        const barcodeType = button.dataset.type;
                        selectBarcodeType(account.id, barcodeType);
                    });
                });
            });

            accounts.forEach(account => {
                fetchBarcode(account.id, 'universe', { cacheOnly: true, preserveDisplay: true, quietMiss: true });
            });
            runWarmWorker();
            refreshVisibleCaches();
            refreshWarmStatus();
            setInterval(runWarmWorker, CLIENT_WARM_INTERVAL_MS);
            setInterval(refreshVisibleCaches, CACHE_REFRESH_INTERVAL_MS);
            setInterval(refreshWarmStatus, 5 * 1000);
            setInterval(renderWarmStatusDetail, 1000);

            function catchUpAfterHidden() {
                if (document.hidden) return;
                refreshVisibleCaches();
                refreshWarmStatus();
                runWarmWorker();
            }
            document.addEventListener('visibilitychange', catchUpAfterHidden);
            window.addEventListener('pageshow', catchUpAfterHidden);
            window.addEventListener('focus', catchUpAfterHidden);

            function queueKey(accountId, barcodeType) {
                return `${accountId}:${barcodeType}`;
            }

            function selectBarcodeType(accountId, barcodeType) {
                const card = document.getElementById(`card-${accountId}`);
                if (!card || card.dataset.currentType === barcodeType) return;
                const img = card.querySelector(`img[data-id="${accountId}"]`);
                const timerEl = card.querySelector('.timer');
                const statusEl = card.querySelector('.status');
                const placeholder = card.querySelector('.barcode-placeholder');
                if (img.dataset.timerId) {
                    clearInterval(parseInt(img.dataset.timerId));
                    delete img.dataset.timerId;
                }
                if (img.dataset.objectUrl) {
                    URL.revokeObjectURL(img.dataset.objectUrl);
                    delete img.dataset.objectUrl;
                }
                delete img.dataset.refreshQueued;
                img.classList.add('hidden');
                placeholder.classList.remove('hidden');
                placeholder.textContent = '자동 갱신 대기 중입니다';
                timerEl.textContent = '';
                statusEl.textContent = '';
                card.dataset.currentType = barcodeType;
                updateTypeButtons(accountId, barcodeType);
                updateBenefits(accountId, barcodeType);
                fetchBarcode(accountId, barcodeType, { cacheOnly: true, preserveDisplay: true, quietMiss: true });
            }

            function updateTypeButtons(accountId, barcodeType) {
                const card = document.getElementById(`card-${accountId}`);
                card.querySelectorAll('.type-btn').forEach(button => {
                    const active = button.dataset.type === barcodeType;
                    button.classList.toggle('active', active);
                    button.classList.toggle('secondary', !active);
                });
            }

            function updateBenefits(accountId, barcodeType) {
                const card = document.getElementById(`card-${accountId}`);
                const list = card.querySelector('.benefit-list');
                if (barcodeType === 'general') {
                    const grade = card.dataset.generalGrade || '';
                    list.innerHTML = `<li>T멤버십 등급: ${grade || '확인 중'}</li>`;
                    return;
                }
                const benefits = benefitsByType[barcodeType][accountId] || benefitsByType[barcodeType].default || [];
                list.innerHTML = benefits.map(benefit => `<li>${benefit}</li>`).join('');
            }

            function enqueueBarcode(accountId, barcodeType, options = {}) {
                const key = queueKey(accountId, barcodeType);
                if (queuedKeys.has(key)) {
                    const card = document.getElementById(`card-${accountId}`);
                    const statusEl = card.querySelector('.status');
                    if (statusEl && options.manual) statusEl.textContent = '이미 갱신 대기 중입니다.';
                    return;
                }
                queuedKeys.add(key);
                refreshQueue.push({ accountId, barcodeType, options });
                processQueue();
            }

            async function processQueue() {
                if (queueRunning) return;
                queueRunning = true;
                while (refreshQueue.length) {
                    const job = refreshQueue.shift();
                    queuedKeys.delete(queueKey(job.accountId, job.barcodeType));
                    await fetchBarcode(job.accountId, job.barcodeType, job.options);
                    await delay(1500);
                }
                queueRunning = false;
            }

            function delay(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }

            function refreshVisibleCaches() {
                accounts.forEach(account => {
                    const card = document.getElementById(`card-${account.id}`);
                    if (!card) return;
                    fetchBarcode(account.id, card.dataset.currentType || 'universe', {
                        cacheOnly: true,
                        preserveDisplay: true,
                        quietMiss: true
                    });
                });
            }

            async function refreshWarmStatus() {
                try {
                    const response = await fetch(`/api/warm_status?t=${Date.now()}`, { cache: 'no-store' });
                    if (!response.ok) return;
                    const status = await response.json();
                    const current = status.current;
                    const dueTargets = (status.targets || [])
                        .map((target, index) => ({ ...target, index }))
                        .filter(target => Number(target.next_refresh_at || 0) <= status.now)
                        .filter(target => !(current && current.id === target.id && current.type === target.type))
                        .sort((a, b) => (a.next_refresh_at - b.next_refresh_at) || (a.index - b.index));

                    if (!current && dueTargets.length && !warmWorkerRunning) {
                        runWarmWorker();
                    }

                    // The status panel polls every 5s, but the visible barcode image only
                    // re-fetches every 30s (refreshVisibleCaches) - so a refresh could finish
                    // (panel shows a fresh countdown) while the displayed image is still the
                    // old one for up to 30s. Detecting last_success_at moving forward here and
                    // immediately re-fetching closes that gap down to ~5s, and crucially also
                    // covers refreshes triggered externally by cron-job.org's warm_tick (not
                    // just ones this tab's own runWarmWorker happened to drive).
                    (status.targets || []).forEach(target => {
                        const key = `${target.id}:${target.type}`;
                        const previousSuccessAt = lastKnownSuccessAt[key];
                        const currentSuccessAt = Number(target.last_success_at || 0);
                        if (previousSuccessAt !== undefined && currentSuccessAt > previousSuccessAt) {
                            const card = document.getElementById(`card-${target.id}`);
                            if (card && card.dataset.currentType === target.type && !fetchingCards.has(target.id)) {
                                fetchBarcode(target.id, target.type, { cacheOnly: true, preserveDisplay: false, quietMiss: true });
                            }
                        }
                        lastKnownSuccessAt[key] = currentSuccessAt;
                    });

                    lastWarmStatusFetch = { status, current, dueTargets, fetchedAtMs: Date.now() };
                    renderWarmStatusDetail();

                    accounts.forEach(account => {
                        if (fetchingCards.has(account.id)) return;
                        const card = document.getElementById(`card-${account.id}`);
                        if (!card) return;
                        const barcodeType = card.dataset.currentType || 'universe';
                        const img = card.querySelector(`img[data-id="${account.id}"]`);
                        if (img.dataset.objectUrl && img.dataset.stale !== '1') return;
                        if (Number(img.dataset.retryUntil || 0) > Date.now()) return;

                        const placeholder = card.querySelector('.barcode-placeholder');
                        const statusEl = card.querySelector('.status');
                        const loader = card.querySelector('.loader');
                        const isActive = Boolean(current && current.id === account.id && current.type === barcodeType);
                        const queuePosition = dueTargets.findIndex(target => target.id === account.id && target.type === barcodeType);
                        const showingStaleImage = Boolean(img.dataset.objectUrl && img.dataset.stale === '1');

                        statusEl.classList.toggle('active-refresh', isActive);

                        if (showingStaleImage) {
                            // Keep the last successful barcode visible; only the status line changes.
                            if (isActive) {
                                statusEl.textContent = `${barcodeTypes[barcodeType]}를 지금 갱신하고 있습니다...`;
                            } else if (queuePosition !== -1) {
                                statusEl.textContent = `대기열 ${queuePosition + 1}번째 - 순서를 기다리는 중입니다.`;
                            }
                            return;
                        }

                        placeholder.classList.remove('hidden');
                        if (isActive) {
                            placeholder.textContent = `${barcodeTypes[barcodeType]} 갱신 중입니다`;
                            loader.classList.remove('hidden');
                            statusEl.textContent = `${barcodeTypes[barcodeType]}를 지금 갱신하고 있습니다...`;
                        } else {
                            loader.classList.add('hidden');
                            placeholder.textContent = '자동 갱신 대기 중입니다';
                            statusEl.textContent = queuePosition !== -1
                                ? `대기열 ${queuePosition + 1}번째 - 순서를 기다리는 중입니다.`
                                : '';
                        }
                    });
                } catch (error) {
                    // Status display is best effort.
                }
            }

            function formatSecondsLeft(seconds) {
                const total = Math.max(0, Math.floor(seconds));
                const m = Math.floor(total / 60);
                const s = total % 60;
                return `${m}:${String(s).padStart(2, '0')} 남음`;
            }

            function targetStatusFor(target, current, dueTargets, elapsedSec) {
                const isActive = Boolean(current && current.id === target.id && current.type === target.type);
                const queuePosition = dueTargets.findIndex(t => t.id === target.id && t.type === target.type);
                if (isActive) {
                    return { valueText: '갱신 중', valueClass: 'active' };
                }
                if (queuePosition !== -1) {
                    return { valueText: `대기 ${queuePosition + 1}번째`, valueClass: 'queued' };
                }
                // Countdown client-side between server polls so the display ticks every
                // second instead of only updating on the next ~5s warm_status refresh.
                const remaining = Math.max(0, Number(target.seconds_left || 0) - elapsedSec);
                if (remaining <= 0) {
                    return { valueText: '만료됨', valueClass: 'stale' };
                }
                return { valueText: formatSecondsLeft(remaining), valueClass: 'fresh' };
            }

            function renderWarmStatusDetail() {
                const detail = document.getElementById('warm-status-detail');
                if (!detail || !lastWarmStatusFetch) return;
                const { status, current, dueTargets, fetchedAtMs } = lastWarmStatusFetch;
                const elapsedSec = Math.max(0, Math.floor((Date.now() - fetchedAtMs) / 1000));

                const byAccount = {};
                (status.targets || []).forEach(target => {
                    if (!byAccount[target.id]) byAccount[target.id] = {};
                    byAccount[target.id][target.type] = targetStatusFor(target, current, dueTargets, elapsedSec);
                });

                const rows = accounts.map(account => {
                    const entry = byAccount[account.id] || {};
                    const uni = entry.universe || { valueText: '-', valueClass: '' };
                    const gen = entry.general || { valueText: '-', valueClass: '' };
                    return `<div class="row">
                        <span class="label">${account.user}</span>
                        <span class="value-group">
                            <span class="value-item"><span class="value-type">우주</span><span class="value ${uni.valueClass}">${uni.valueText}</span></span>
                            <span class="value-item"><span class="value-type">일반</span><span class="value ${gen.valueClass}">${gen.valueText}</span></span>
                        </span>
                    </div>`;
                }).join('');
                detail.innerHTML = rows;
            }

            async function runWarmWorker() {
                if (warmWorkerRunning) return;
                warmWorkerRunning = true;
                let next = null;
                let success = false;
                let httpCode = '';
                try {
                    const nextResponse = await fetch(`/api/warm_next?t=${Date.now()}`, { cache: 'no-store' });
                    if (!nextResponse.ok) return;
                    next = await nextResponse.json();
                    if (next.status !== 'ok') {
                        if (next.status === 'locked') {
                            setTimeout(refreshWarmStatus, 1000);
                        }
                        return;
                    }
                    refreshWarmStatus();

                    const forceScrapeParam = next.force_scrape ? '&force_scrape=1' : '';
                    const response = await fetch(`/api/get_barcode?id=${next.id}&type=${next.type}&warm=1${forceScrapeParam}&t=${Date.now()}`, {
                        cache: 'no-store'
                    });
                    httpCode = String(response.status);
                    success = response.ok && (response.headers.get('Content-Type') || '').startsWith('image/');
                    if (success) {
                        await response.blob();
                        const card = document.getElementById(`card-${next.id}`);
                        if (card && card.dataset.currentType === next.type) {
                            fetchBarcode(next.id, next.type, { cacheOnly: true, preserveDisplay: false, quietMiss: true });
                        }
                    }
                } catch (error) {
                    httpCode = error.name || 'client_error';
                } finally {
                    if (next && next.status === 'ok' && next.token) {
                        const params = new URLSearchParams({
                            id: next.id,
                            type: next.type,
                            token: next.token,
                            success: success ? '1' : '0',
                            http_code: httpCode,
                            t: String(Date.now())
                        });
                        try {
                            await fetch(`/api/warm_done?${params.toString()}`, { cache: 'no-store' });
                        } catch (error) {
                            // The lock expires on the server if this best-effort release fails.
                        }
                    }
                    warmWorkerRunning = false;
                }
            }

            async function fetchBarcode(accountId, barcodeType, options = {}) {
                const card = document.getElementById(`card-${accountId}`);
                const img = card.querySelector(`img[data-id="${accountId}"]`);
                const loader = card.querySelector('.loader');
                const placeholder = card.querySelector('.barcode-placeholder');
                const timerEl = card.querySelector('.timer');
                const statusEl = card.querySelector('.status');
                const buttons = card.querySelectorAll('.type-btn');
                const preserveDisplay = Boolean(options.preserveDisplay && img.dataset.objectUrl && card.dataset.currentType === barcodeType);

                if (card.dataset.currentType !== barcodeType && !options.cacheOnly) {
                    return;
                }

                fetchingCards.add(accountId);
                delete img.dataset.retryUntil;

                if (!preserveDisplay && img.dataset.timerId) {
                    clearInterval(parseInt(img.dataset.timerId));
                    delete img.dataset.timerId;
                }
                if (!preserveDisplay && img.dataset.objectUrl) {
                    URL.revokeObjectURL(img.dataset.objectUrl);
                    delete img.dataset.objectUrl;
                }

                if (!preserveDisplay) {
                    img.classList.add('hidden');
                    placeholder.classList.add('hidden');
                    timerEl.textContent = '';
                }
                // preserveDisplay means "there's already a valid image showing - this is just a
                // quiet cache poll (every 30s from refreshVisibleCaches, or on a last_success_at
                // change), not an actual live scrape". Flashing the loader/"생성 중" message here
                // made it look like the barcode was being re-scraped every 30s when it never was.
                if (!preserveDisplay) {
                    loader.classList.remove('hidden');
                    buttons.forEach(button => button.disabled = true);
                    statusEl.textContent = options.auto ? `${barcodeTypes[barcodeType]} 자동 갱신 중입니다...` : `${barcodeTypes[barcodeType]}를 실시간으로 생성 중입니다...`;
                }

                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 55000);
                    const cacheOnlyParam = options.cacheOnly ? '&cache_only=1' : '';
                    const response = await fetch(`/api/get_barcode?id=${accountId}&type=${barcodeType}${cacheOnlyParam}&t=${Date.now()}`, {
                        cache: 'no-store',
                        signal: controller.signal
                    });
                    clearTimeout(timeoutId);
                    if (response.status === 404 && options.cacheOnly) {
                        loader.classList.add('hidden');
                        if (!preserveDisplay) {
                            placeholder.classList.remove('hidden');
                            placeholder.textContent = '아직 저장된 바코드가 없습니다';
                            statusEl.textContent = '순차 갱신 대기 중입니다.';
                        } else {
                            statusEl.textContent = '순차 갱신 대기 중입니다.';
                        }
                        return;
                    }
                    if (response.status === 423) {
                        const retryAfter = Math.max(60, parseInt(response.headers.get('Retry-After') || '75', 10));
                        loader.classList.add('hidden');
                        if (!preserveDisplay) {
                            img.classList.add('hidden');
                            placeholder.classList.remove('hidden');
                            placeholder.textContent = '다른 바코드가 갱신 중입니다. 잠시 후 자동 재시도합니다.';
                        }
                        statusEl.textContent = `${retryAfter}초 후 다시 시도합니다.`;
                        img.dataset.retryUntil = String(Date.now() + retryAfter * 1000);
                        setTimeout(() => enqueueBarcode(accountId, barcodeType, {
                            auto: options.auto,
                            manual: options.manual,
                            preserveDisplay: true
                        }), retryAfter * 1000);
                        return;
                    }
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }
                    const blob = await response.blob();
                    if (!blob.type.startsWith('image/')) {
                        throw new Error('이미지 응답이 아닙니다');
                    }
                    const objectUrl = URL.createObjectURL(blob);
                    const parsedSecondsLeft = parseInt(response.headers.get('X-Barcode-Seconds-Left') || '', 10);
                    const secondsLeft = Number.isFinite(parsedSecondsLeft) ? parsedSecondsLeft : BARCODE_VALID_TIME;
                    const barcodeNumber = response.headers.get('X-Barcode-Number') || '';
                    const membershipGrade = response.headers.get('X-Membership-Grade') || '';
                    const isStale = response.headers.get('X-Barcode-Stale') === '1';
                    if (barcodeType === 'general' && membershipGrade) {
                        card.dataset.generalGrade = membershipGrade;
                        updateBenefits(accountId, barcodeType);
                    }

                    if (card.dataset.currentType !== barcodeType) {
                        URL.revokeObjectURL(objectUrl);
                        return;
                    }
                    if (img.dataset.timerId) {
                        clearInterval(parseInt(img.dataset.timerId));
                        delete img.dataset.timerId;
                    }
                    if (img.dataset.objectUrl) {
                        URL.revokeObjectURL(img.dataset.objectUrl);
                    }
                    delete img.dataset.refreshQueued;
                    img.dataset.stale = isStale ? '1' : '0';
                    img.dataset.objectUrl = objectUrl;
                    img.src = objectUrl;
                    img.classList.remove('hidden');
                    placeholder.classList.add('hidden');
                    loader.classList.add('hidden');
                    if (isStale) {
                        timerEl.textContent = '만료됨';
                        statusEl.textContent = barcodeNumber
                            ? `마지막 ${barcodeTypes[barcodeType]}를 표시 중입니다. 순차 갱신 대기 중입니다. (${barcodeNumber})`
                            : `마지막 ${barcodeTypes[barcodeType]}를 표시 중입니다. 순차 갱신 대기 중입니다.`;
                        runWarmWorker();
                    } else {
                        statusEl.textContent = barcodeNumber ? `${barcodeTypes[barcodeType]}가 생성되었습니다. (${barcodeNumber})` : `${barcodeTypes[barcodeType]}가 생성되었습니다.`;
                        startTimer(accountId, barcodeType, secondsLeft);
                    }
                } catch (error) {
                    loader.classList.add('hidden');
                    if (!preserveDisplay) {
                        img.classList.add('hidden');
                        placeholder.classList.remove('hidden');
                    }
                    placeholder.textContent = error.name === 'AbortError'
                        ? '생성 시간이 초과되었습니다. 다시 시도해주세요.'
                        : '오류가 발생했습니다. 다시 시도해주세요.';
                    statusEl.textContent = error.name === 'AbortError' ? '요청 시간 초과' : String(error.message || error);
                } finally {
                    buttons.forEach(button => button.disabled = false);
                    fetchingCards.delete(accountId);
                }
            }

            function startTimer(accountId, barcodeType, duration) {
                const card = document.getElementById(`card-${accountId}`);
                const img = card.querySelector(`img[data-id="${accountId}"]`);
                const timerEl = card.querySelector('.timer');
                const statusEl = card.querySelector('.status');

                let timeLeft = Math.max(1, duration);

                const updateTimer = () => {
                    if (card.dataset.currentType !== barcodeType) {
                        clearInterval(timerId);
                        return;
                    }
                    const minutes = Math.floor(timeLeft / 60);
                    const seconds = timeLeft % 60;
                    timerEl.textContent = `남은 시간: ${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;

                    if (--timeLeft < 0) {
                        clearInterval(timerId);
                        delete img.dataset.timerId;
                        if (img.dataset.refreshQueued !== '1') {
                            img.dataset.refreshQueued = '1';
                            statusEl.textContent = '20분이 지나 순차 갱신 대기 중입니다.';
                            runWarmWorker();
                        }
                    }
                };

                updateTimer();
                const timerId = setInterval(updateTimer, 1000);
                img.dataset.timerId = timerId.toString();
            }
        });
    </script>
</body>
</html>
