name: Warm T Universe barcodes

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: warm-t-universe-barcodes
  cancel-in-progress: false

jobs:
  warm:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Warm one barcode cache entry
        shell: bash
        run: |
          ids=("a77ila2000" "a77ila10004" "min560728" "a77ila2000" "a77ila10004" "min560728")
          names=("me-universe" "mother-universe" "father-universe" "me-general" "mother-general" "father-general")
          types=("universe" "universe" "universe" "general" "general" "general")

          slot=$(( ($(date +%s) / 600) % 6 ))
          id="${ids[$slot]}"
          name="${names[$slot]}"
          type="${types[$slot]}"
          url="https://preedgaonprime.vercel.app/api/get_barcode?id=${id}&type=${type}&warm=1&t=$(date +%s%3N)"

          echo "Calling ${name} (${id})"
          http_code=$(curl --location --silent --show-error --max-time 75 \
            --output "/tmp/barcode-${id}.png" \
            --write-out "%{http_code}" \
            "$url" || true)
          bytes=$(wc -c < "/tmp/barcode-${id}.png" 2>/dev/null || echo 0)
          echo "${name}: HTTP $http_code, bytes=$bytes"
          echo "Warmup finished. Individual failures are tolerated because T ID/T Universe may be slow."
