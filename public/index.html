<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T우주 가족 바코드</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>T우주 가족 바코드</h1>
            <div id="warm-status-detail" class="warm-status-detail"></div>
        </header>

        <main id="card-container"></main>

        <div class="card links-card">
            <h3>바로가기</h3>
            <div class="links-container">
                <a href="https://m.tworld.co.kr/membership/benefit/brand" target="_blank">제휴 브랜드 확인</a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // The browser calls Oracle directly. There is no Vercel Function proxy in
            // this path, so normal page views consume no Vercel Function CPU.
            const API_BASE = 'https://168-138-194-2.sslip.io';
            const accounts = [
                { user: '나', id: 'a77ila2000' },
                { user: '어머니', id: 'a77ila10004' },
                { user: '아버지', id: 'min560728' }
            ];

            const barcodeTypes = {
                universe: '우주바코드',
                general: '일반바코드'
            };

            const benefitsByType = {
                universe: {
                    a77ila2000: [
                        '파리바게뜨 30% 할인 / 월 3만원 한도'
                    ],
                    a77ila10004: [
                        '세븐일레븐 30% 할인 / 월 3만원 한도',
                        '투썸플레이스 30% 할인 / 월 3만원 한도',
                        'CU 편의점 20% 할인 / 월 3만원 한도'
                    ],
                    min560728: [
                        '파리바게뜨 30% 할인 / 월 3만원 한도',
                        'CU 편의점 20% 할인 / 월 3만원 한도'
                    ]
                },
                general: {
                    default: [
                        'T멤버십 일반 바코드',
                        'T멤버십 제휴처에서 할인 또는 적립 가능'
                    ]
                }
            };

            const cardContainer = document.getElementById('card-container');
            const BARCODE_VALID_TIME = 20 * 60;
            const fetchingCards = new Set();
            // Separate from fetchingCards above (which is keyed by accountId alone, and only
            // used to skip clobbering status text during a poll) - this one is keyed by
            // "accountId:type" and is a real duplicate-request guard: without it, two nearly-
            // simultaneous triggers for the same account+type (e.g. a tab regaining focus
            // right as the 5s status poll also fires) would both fire actual HTTP requests.
            const inFlightFetches = new Set();
            let lastWarmStatusFetch = null;
            const lastKnownSuccessAt = {};

            accounts.forEach(account => {
                const card = document.createElement('div');
                card.className = 'card';
                card.id = `card-${account.id}`;
                card.dataset.currentType = 'universe';
                card.innerHTML = `
                    <div class="card-header">
                        <h2>${account.user}</h2>
                    </div>
                    <div class="barcode-actions">
                        <button class="btn type-btn active" data-id="${account.id}" data-type="universe">우주바코드</button>
                        <button class="btn type-btn secondary" data-id="${account.id}" data-type="general">일반바코드</button>
                    </div>
                    <div class="barcode-container">
                        <div class="barcode-placeholder">자동 갱신 대기 중입니다</div>
                        <div class="loader hidden"></div>
                        <img data-id="${account.id}" class="hidden" alt="${account.user} 바코드">
                    </div>
                    <div class="card-footer">
                        <div class="timer"></div>
                        <div class="status"></div>
                    </div>
                    <div class="benefit-box">
                        <div class="benefit-title">사용 가능 할인</div>
                        <ul class="benefit-list"></ul>
                    </div>
                `;
                cardContainer.appendChild(card);
                updateBenefits(account.id, 'universe');

                card.querySelectorAll('.type-btn').forEach(button => {
                    button.addEventListener('click', () => {
                        const barcodeType = button.dataset.type;
                        selectBarcodeType(account.id, barcodeType);
                    });
                });
            });

            // One-time initial load of the visible barcode images. The recurring 30s
            // refreshVisibleCaches() poll that used to run alongside this was removed -
            // refreshWarmStatus()'s last_success_at watcher (every 5s) already re-fetches
            // the image the moment a refresh actually completes, so the 30s poll was pure
            // redundant traffic. This call and the accounts.forEach(fetchBarcode...) loop
            // that used to run right before it were also duplicates of each other (both
            // fetched the same default-universe cache for all three accounts at page load);
            // this single call covers it.
            // Refreshing is owned by the Oracle systemd worker. The browser only reads its
            // cached result and never starts a login/scrape request itself.
            refreshVisibleCaches();
            refreshWarmStatus().then(scheduleNextStatusPoll);
            setInterval(() => {
                renderWarmStatusDetail();
                updateVisibleCardTimers();
            }, 1000);

            let catchUpTimer = null;
            function catchUpAfterHidden() {
                if (document.hidden) return;
                // visibilitychange/pageshow/focus can fire within milliseconds of each other
                // on the same real "tab became active again" event - debounce so that burst
                // triggers one catch-up pass, not three.
                if (catchUpTimer) return;
                catchUpTimer = setTimeout(() => {
                    catchUpTimer = null;
                    refreshVisibleCaches();
                    refreshWarmStatus().then(scheduleNextStatusPoll);
                }, 350);
            }
            document.addEventListener('visibilitychange', catchUpAfterHidden);
            window.addEventListener('pageshow', catchUpAfterHidden);
            window.addEventListener('focus', catchUpAfterHidden);

            function queueKey(accountId, barcodeType) {
                return `${accountId}:${barcodeType}`;
            }

            function selectBarcodeType(accountId, barcodeType) {
                const card = document.getElementById(`card-${accountId}`);
                if (!card || card.dataset.currentType === barcodeType) return;
                const img = card.querySelector(`img[data-id="${accountId}"]`);
                const timerEl = card.querySelector('.timer');
                const statusEl = card.querySelector('.status');
                const placeholder = card.querySelector('.barcode-placeholder');
                if (img.dataset.timerId) {
                    clearInterval(parseInt(img.dataset.timerId));
                    delete img.dataset.timerId;
                }
                if (img.dataset.objectUrl) {
                    URL.revokeObjectURL(img.dataset.objectUrl);
                    delete img.dataset.objectUrl;
                }
                delete img.dataset.refreshQueued;
                img.classList.add('hidden');
                placeholder.classList.remove('hidden');
                placeholder.textContent = '자동 갱신 대기 중입니다';
                timerEl.textContent = '';
                statusEl.textContent = '';
                card.dataset.currentType = barcodeType;
                updateTypeButtons(accountId, barcodeType);
                updateBenefits(accountId, barcodeType);
                fetchBarcode(accountId, barcodeType, { cacheOnly: true, preserveDisplay: true });
            }

            function updateTypeButtons(accountId, barcodeType) {
                const card = document.getElementById(`card-${accountId}`);
                card.querySelectorAll('.type-btn').forEach(button => {
                    const active = button.dataset.type === barcodeType;
                    button.classList.toggle('active', active);
                    button.classList.toggle('secondary', !active);
                });
            }

            function updateBenefits(accountId, barcodeType) {
                const card = document.getElementById(`card-${accountId}`);
                const list = card.querySelector('.benefit-list');
                if (barcodeType === 'general') {
                    const grade = card.dataset.generalGrade || '';
                    list.innerHTML = `<li>T멤버십 등급: ${grade || '확인 중'}</li>`;
                    return;
                }
                const benefits = benefitsByType[barcodeType][accountId] || benefitsByType[barcodeType].default || [];
                list.innerHTML = benefits.map(benefit => `<li>${benefit}</li>`).join('');
            }

            function refreshVisibleCaches() {
                accounts.forEach(account => {
                    const card = document.getElementById(`card-${account.id}`);
                    if (!card) return;
                    fetchBarcode(account.id, card.dataset.currentType || 'universe', {
                        cacheOnly: true,
                        preserveDisplay: true
                    });
                });
            }

            async function refreshWarmStatus() {
                try {
                    const response = await fetch(`${API_BASE}/api/warm_status?t=${Date.now()}`, { cache: 'no-store' });
                    if (!response.ok) return;
                    const status = await response.json();
                    const current = status.current;
                    const dueTargets = (status.targets || [])
                        .map((target, index) => ({ ...target, index }))
                        .filter(target => Number(target.next_refresh_at || 0) <= status.now)
                        .filter(target => !(current && current.id === target.id && current.type === target.type))
                        .sort((a, b) => (a.next_refresh_at - b.next_refresh_at) || (a.index - b.index));

                    // This is the only recurring re-fetch of the visible barcode image left
                    // (refreshVisibleCaches itself only runs once, at page load, plus on
                    // tab-refocus) - detecting last_success_at moving forward here (every 5s)
                    // and immediately re-fetching covers every real Oracle worker refresh.
                    (status.targets || []).forEach(target => {
                        const key = `${target.id}:${target.type}`;
                        const previousSuccessAt = lastKnownSuccessAt[key];
                        const currentSuccessAt = Number(target.last_success_at || 0);
                        if (previousSuccessAt !== undefined && currentSuccessAt > previousSuccessAt) {
                            const card = document.getElementById(`card-${target.id}`);
                            if (card && card.dataset.currentType === target.type && !fetchingCards.has(target.id)) {
                                fetchBarcode(target.id, target.type, { cacheOnly: true, preserveDisplay: false });
                            }
                        }
                        lastKnownSuccessAt[key] = currentSuccessAt;
                    });

                    lastWarmStatusFetch = { status, current, dueTargets, fetchedAtMs: Date.now() };
                    renderWarmStatusDetail();
                    updateVisibleCardTimers();

                    accounts.forEach(account => {
                        if (fetchingCards.has(account.id)) return;
                        const card = document.getElementById(`card-${account.id}`);
                        if (!card) return;
                        const barcodeType = card.dataset.currentType || 'universe';
                        const img = card.querySelector(`img[data-id="${account.id}"]`);
                        const isActive = Boolean(current && current.id === account.id && current.type === barcodeType);
                        const queuePosition = dueTargets.findIndex(target => target.id === account.id && target.type === barcodeType);
                        // Whether this target is due comes straight from this warm_status poll
                        // (isActive/dueTargets), not from img.dataset.stale - that DOM flag is
                        // only set once an actual fetchBarcode response comes back, which (with
                        // no tab-refocus event to force one) doesn't happen until the refresh
                        // itself finishes. Gating on it left this per-card status frozen at
                        // whatever text was showing at the moment of local expiry for the
                        // entire refresh duration, while the status panel above (driven by the
                        // same poll) correctly ticked through "갱신 중 (M:SS 경과)" the whole time.
                        const isDue = isActive || queuePosition !== -1;
                        if (img.dataset.objectUrl && !isDue) return;

                        const placeholder = card.querySelector('.barcode-placeholder');
                        const statusEl = card.querySelector('.status');
                        const loader = card.querySelector('.loader');
                        const showingStaleImage = Boolean(img.dataset.objectUrl && isDue);

                        statusEl.classList.toggle('active-refresh', isActive);

                        if (showingStaleImage) {
                            // Keep the last successful barcode visible; only the status line changes.
                            if (isActive) {
                                statusEl.textContent = `${barcodeTypes[barcodeType]}를 지금 갱신하고 있습니다...`;
                            } else if (queuePosition !== -1) {
                                statusEl.textContent = `대기열 ${queuePosition + 1}번째 - 순서를 기다리는 중입니다.`;
                            }
                            return;
                        }

                        placeholder.classList.remove('hidden');
                        if (isActive) {
                            placeholder.textContent = `${barcodeTypes[barcodeType]} 갱신 중입니다`;
                            loader.classList.remove('hidden');
                            statusEl.textContent = `${barcodeTypes[barcodeType]}를 지금 갱신하고 있습니다...`;
                        } else {
                            loader.classList.add('hidden');
                            placeholder.textContent = '자동 갱신 대기 중입니다';
                            statusEl.textContent = queuePosition !== -1
                                ? `대기열 ${queuePosition + 1}번째 - 순서를 기다리는 중입니다.`
                                : '';
                        }
                    });
                } catch (error) {
                    // Status display is best effort.
                }
            }

            let statusPollTimer = null;

            function nextStatusDelay() {
                // Fixed 5s polling cost real Vercel invocations around the clock even when
                // every account had 10+ minutes left and nothing was happening - tighten only
                // when something is actually worth watching closely, relax otherwise.
                if (document.hidden) return null; // pause entirely; catchUpAfterHidden resumes on refocus
                if (!lastWarmStatusFetch) return 5000; // no first response yet, stay snappy until we have one
                const { current, dueTargets, status, fetchedAtMs } = lastWarmStatusFetch;
                if (current || dueTargets.length) return 3000; // a refresh is active or queued - watch closely
                const elapsedSec = Math.max(0, Math.floor((Date.now() - fetchedAtMs) / 1000));
                const dueSoon = (status.targets || []).some(target => (Number(target.seconds_left || 0) - elapsedSec) <= 60);
                return dueSoon ? 5000 : 25000;
            }

            function scheduleNextStatusPoll() {
                if (statusPollTimer) clearTimeout(statusPollTimer);
                const delay = nextStatusDelay();
                if (delay === null) return;
                statusPollTimer = setTimeout(async () => {
                    await refreshWarmStatus();
                    scheduleNextStatusPoll();
                }, delay);
            }

            function formatMinSec(seconds) {
                const total = Math.max(0, Math.floor(seconds));
                const m = Math.floor(total / 60);
                const s = total % 60;
                return `${m}:${String(s).padStart(2, '0')}`;
            }

            function targetStatusFor(target, current, dueTargets, elapsedSec) {
                const isActive = Boolean(current && current.id === target.id && current.type === target.type);
                const queuePosition = dueTargets.findIndex(t => t.id === target.id && t.type === target.type);
                // Countdown client-side between server polls so the display ticks every
                // second instead of only updating on the next ~5s warm_status refresh.
                const remaining = Number(target.seconds_left || 0) - elapsedSec;
                // target.stale_seconds is how long it had already been expired as of the last
                // poll; elapsedSec is time since that poll, minus any of target's own
                // seconds_left that hadn't yet run out at poll time (covers the case where
                // this is reached by the client's own countdown predicting expiry before the
                // server has confirmed it). Active/queued targets are always past due, so this
                // is the right time value to show alongside those states too, not just "stale".
                const staleFor = Number(target.stale_seconds || 0) + elapsedSec - Number(target.seconds_left || 0);

                if (isActive) {
                    return { valueText: `갱신 중 (${formatMinSec(staleFor)} 경과)`, valueClass: 'active' };
                }
                if (queuePosition !== -1) {
                    return { valueText: `대기 ${queuePosition + 1}번째 (${formatMinSec(staleFor)} 경과)`, valueClass: 'queued' };
                }
                if (remaining <= 0) {
                    return { valueText: `만료됨 (${formatMinSec(staleFor)} 경과)`, valueClass: 'stale' };
                }
                return { valueText: `${formatMinSec(remaining)} 남음`, valueClass: 'fresh' };
            }

            function renderWarmStatusDetail() {
                const detail = document.getElementById('warm-status-detail');
                if (!detail || !lastWarmStatusFetch) return;
                const { status, current, dueTargets, fetchedAtMs } = lastWarmStatusFetch;
                const elapsedSec = Math.max(0, Math.floor((Date.now() - fetchedAtMs) / 1000));

                const byAccount = {};
                (status.targets || []).forEach(target => {
                    if (!byAccount[target.id]) byAccount[target.id] = {};
                    byAccount[target.id][target.type] = targetStatusFor(target, current, dueTargets, elapsedSec);
                });

                const rows = accounts.map(account => {
                    const entry = byAccount[account.id] || {};
                    const uni = entry.universe || { valueText: '-', valueClass: '' };
                    const gen = entry.general || { valueText: '-', valueClass: '' };
                    return `<div class="row">
                        <span class="label">${account.user}</span>
                        <span class="value-type">우주</span>
                        <span class="value ${uni.valueClass}">${uni.valueText}</span>
                        <span class="value-type">일반</span>
                        <span class="value ${gen.valueClass}">${gen.valueText}</span>
                    </div>`;
                }).join('');
                detail.innerHTML = rows;
            }

            function updateVisibleCardTimers() {
                // Keeps each card's own "만료됨 (M:SS 경과)" timer perfectly in sync with the
                // status panel above, by computing it from the exact same warm_status snapshot
                // and formula (targetStatusFor draws from lastWarmStatusFetch too) - they used
                // to be two independently-seeded timers (this one seeded once from whatever
                // fetchBarcode's own response happened to say, then ticking on its own), which
                // drifted apart by a few seconds since each was based on a different poll.
                if (!lastWarmStatusFetch) return;
                const { status, fetchedAtMs } = lastWarmStatusFetch;
                const elapsedSec = Math.max(0, Math.floor((Date.now() - fetchedAtMs) / 1000));
                accounts.forEach(account => {
                    const card = document.getElementById(`card-${account.id}`);
                    if (!card) return;
                    const img = card.querySelector(`img[data-id="${account.id}"]`);
                    // Same fix as refreshWarmStatus's per-card block above: determine "is this
                    // due" from the live warm_status target data (remaining <= 0 below), not
                    // from img.dataset.stale, which lags behind by up to a full refresh cycle.
                    if (!img || !img.dataset.objectUrl) return;
                    const barcodeType = card.dataset.currentType || 'universe';
                    const target = (status.targets || []).find(t => t.id === account.id && t.type === barcodeType);
                    if (!target) return;
                    const remaining = Number(target.seconds_left || 0) - elapsedSec;
                    if (remaining > 0) return;
                    const staleFor = Number(target.stale_seconds || 0) + elapsedSec - Number(target.seconds_left || 0);
                    const timerEl = card.querySelector('.timer');
                    timerEl.textContent = `만료됨 (${formatMinSec(staleFor)} 경과)`;
                });
            }

            async function fetchBarcode(accountId, barcodeType, options = {}) {
                const card = document.getElementById(`card-${accountId}`);
                const img = card.querySelector(`img[data-id="${accountId}"]`);
                const loader = card.querySelector('.loader');
                const placeholder = card.querySelector('.barcode-placeholder');
                const timerEl = card.querySelector('.timer');
                const statusEl = card.querySelector('.status');
                const buttons = card.querySelectorAll('.type-btn');
                const preserveDisplay = Boolean(options.preserveDisplay && img.dataset.objectUrl && card.dataset.currentType === barcodeType);

                if (card.dataset.currentType !== barcodeType && !options.cacheOnly) {
                    return;
                }

                const inFlightKey = queueKey(accountId, barcodeType);
                if (inFlightFetches.has(inFlightKey)) return;
                inFlightFetches.add(inFlightKey);

                fetchingCards.add(accountId);

                if (!preserveDisplay && img.dataset.timerId) {
                    clearInterval(parseInt(img.dataset.timerId));
                    delete img.dataset.timerId;
                }
                if (!preserveDisplay && img.dataset.objectUrl) {
                    URL.revokeObjectURL(img.dataset.objectUrl);
                    delete img.dataset.objectUrl;
                }

                if (!preserveDisplay) {
                    img.classList.add('hidden');
                    placeholder.classList.add('hidden');
                    timerEl.textContent = '';
                }
                // preserveDisplay means "there's already a valid image showing - this is just a
                // quiet cache poll (page load, tab-refocus, or a last_success_at change), not an
                // actual live scrape". Flashing the loader/"생성 중" message here made it look
                // like the barcode was being re-scraped constantly when it never was.
                if (!preserveDisplay) {
                    loader.classList.remove('hidden');
                    buttons.forEach(button => button.disabled = true);
                    statusEl.textContent = `${barcodeTypes[barcodeType]}를 불러오는 중입니다...`;
                }

                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 8000);
                    const cacheOnlyParam = options.cacheOnly ? '&cache_only=1' : '';
                    const response = await fetch(`${API_BASE}/api/get_barcode?id=${accountId}&type=${barcodeType}${cacheOnlyParam}&t=${Date.now()}`, {
                        cache: 'no-store',
                        signal: controller.signal
                    });
                    clearTimeout(timeoutId);
                    if (response.status === 404 && options.cacheOnly) {
                        loader.classList.add('hidden');
                        if (!preserveDisplay) {
                            placeholder.classList.remove('hidden');
                            placeholder.textContent = '아직 저장된 바코드가 없습니다';
                            statusEl.textContent = '순차 갱신 대기 중입니다.';
                        } else {
                            statusEl.textContent = '순차 갱신 대기 중입니다.';
                        }
                        return;
                    }
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }
                    const blob = await response.blob();
                    if (!blob.type.startsWith('image/')) {
                        throw new Error('이미지 응답이 아닙니다');
                    }
                    const objectUrl = URL.createObjectURL(blob);
                    const parsedSecondsLeft = parseInt(response.headers.get('X-Barcode-Seconds-Left') || '', 10);
                    const secondsLeft = Number.isFinite(parsedSecondsLeft) ? parsedSecondsLeft : BARCODE_VALID_TIME;
                    const barcodeNumber = response.headers.get('X-Barcode-Number') || '';
                    const membershipGrade = response.headers.get('X-Membership-Grade') || '';
                    const isStale = response.headers.get('X-Barcode-Stale') === '1';
                    const parsedStaleSeconds = parseInt(response.headers.get('X-Barcode-Stale-Seconds') || '', 10);
                    const staleSeconds = Number.isFinite(parsedStaleSeconds) ? parsedStaleSeconds : 0;
                    if (barcodeType === 'general' && membershipGrade) {
                        card.dataset.generalGrade = membershipGrade;
                        updateBenefits(accountId, barcodeType);
                    }

                    if (card.dataset.currentType !== barcodeType) {
                        URL.revokeObjectURL(objectUrl);
                        return;
                    }
                    if (img.dataset.timerId) {
                        clearInterval(parseInt(img.dataset.timerId));
                        delete img.dataset.timerId;
                    }
                    if (img.dataset.objectUrl) {
                        URL.revokeObjectURL(img.dataset.objectUrl);
                    }
                    delete img.dataset.refreshQueued;
                    img.dataset.objectUrl = objectUrl;
                    img.src = objectUrl;
                    img.classList.remove('hidden');
                    placeholder.classList.add('hidden');
                    loader.classList.add('hidden');
                    if (isStale) {
                        // Set an immediate value from this response so there's no blank/stale
                        // text before the next tick; updateVisibleCardTimers() (driven by the
                        // same warm_status polling as the status panel above) takes over the
                        // continuous ticking from here, so the two never drift apart.
                        timerEl.textContent = `만료됨 (${formatMinSec(staleSeconds)} 경과)`;
                        statusEl.textContent = barcodeNumber
                            ? `마지막 ${barcodeTypes[barcodeType]}를 표시 중입니다. 순차 갱신 대기 중입니다. (${barcodeNumber})`
                            : `마지막 ${barcodeTypes[barcodeType]}를 표시 중입니다. 순차 갱신 대기 중입니다.`;
                    } else {
                        statusEl.textContent = barcodeNumber ? `${barcodeTypes[barcodeType]}가 생성되었습니다. (${barcodeNumber})` : `${barcodeTypes[barcodeType]}가 생성되었습니다.`;
                        startTimer(accountId, barcodeType, secondsLeft);
                    }
                } catch (error) {
                    loader.classList.add('hidden');
                    if (!preserveDisplay) {
                        img.classList.add('hidden');
                        placeholder.classList.remove('hidden');
                    }
                    placeholder.textContent = error.name === 'AbortError'
                        ? '생성 시간이 초과되었습니다. 다시 시도해주세요.'
                        : '오류가 발생했습니다. 다시 시도해주세요.';
                    statusEl.textContent = error.name === 'AbortError' ? '요청 시간 초과' : String(error.message || error);
                } finally {
                    buttons.forEach(button => button.disabled = false);
                    fetchingCards.delete(accountId);
                    inFlightFetches.delete(inFlightKey);
                }
            }

            function startTimer(accountId, barcodeType, duration) {
                const card = document.getElementById(`card-${accountId}`);
                const img = card.querySelector(`img[data-id="${accountId}"]`);
                const timerEl = card.querySelector('.timer');
                const statusEl = card.querySelector('.status');

                let timeLeft = Math.max(1, duration);

                const updateTimer = () => {
                    if (card.dataset.currentType !== barcodeType) {
                        clearInterval(timerId);
                        return;
                    }
                    const minutes = Math.floor(timeLeft / 60);
                    const seconds = timeLeft % 60;
                    timerEl.textContent = `남은 시간: ${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;

                    if (--timeLeft < 0) {
                        clearInterval(timerId);
                        delete img.dataset.timerId;
                        if (img.dataset.refreshQueued !== '1') {
                            img.dataset.refreshQueued = '1';
                            statusEl.textContent = '20분이 지나 순차 갱신 대기 중입니다.';
                        }
                    }
                };

                updateTimer();
                const timerId = setInterval(updateTimer, 1000);
                img.dataset.timerId = timerId.toString();
            }

        });
    </script>
</body>
</html>
