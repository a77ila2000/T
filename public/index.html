<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T우주 가족 바코드</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .btn:disabled {
            opacity: 0.55;
            cursor: wait;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>T우주 가족 바코드</h1>
        </header>

        <main id="card-container"></main>

        <div class="card links-card">
            <h3>바로가기</h3>
            <div class="links-container">
                <a href="https://m.paris.co.kr/" target="_blank">파리바게뜨</a>
                <a href="https://pocketcu.co.kr/main" target="_blank">포켓CU</a>
                <a href="https://m.sktmembership.co.kr/m/" target="_blank">T멤버십</a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const accounts = [
                { user: "나", id: "a77ila2000" },
                { user: "어머니", id: "a77ila10004" },
                { user: "아버지", id: "min560728" }
            ];

            const cardContainer = document.getElementById('card-container');
            const BARCODE_VALID_TIME = 20 * 60;
            const INITIAL_STAGGER_MS = 10 * 60 * 1000;
            const refreshQueue = [];
            const queuedIds = new Set();
            let queueRunning = false;

            accounts.forEach(account => {
                const card = document.createElement('div');
                card.className = 'card';
                card.id = `card-${account.id}`;
                card.innerHTML = `
                    <div class="card-header">
                        <h2>${account.user}</h2>
                        <button class="btn" data-id="${account.id}">바코드 보기</button>
                    </div>
                    <div class="barcode-container">
                        <div class="barcode-placeholder">자동 갱신 대기 중입니다</div>
                        <div class="loader hidden"></div>
                        <img data-id="${account.id}" class="hidden" alt="${account.user} 바코드">
                    </div>
                    <div class="card-footer">
                        <div class="timer"></div>
                        <div class="status"></div>
                    </div>
                `;
                cardContainer.appendChild(card);

                const button = card.querySelector('.btn');
                button.addEventListener('click', () => enqueueBarcode(account.id, { manual: true, preserveDisplay: false }));
            });

            accounts.forEach((account, index) => {
                setTimeout(() => enqueueBarcode(account.id, { auto: true, preserveDisplay: true }), index * INITIAL_STAGGER_MS);
            });

            function enqueueBarcode(accountId, options = {}) {
                if (queuedIds.has(accountId)) {
                    const card = document.getElementById(`card-${accountId}`);
                    const statusEl = card.querySelector('.status');
                    if (statusEl && options.manual) statusEl.textContent = '이미 갱신 대기 중입니다.';
                    return;
                }
                queuedIds.add(accountId);
                refreshQueue.push({ accountId, options });
                processQueue();
            }

            async function processQueue() {
                if (queueRunning) return;
                queueRunning = true;
                while (refreshQueue.length) {
                    const job = refreshQueue.shift();
                    queuedIds.delete(job.accountId);
                    await fetchBarcode(job.accountId, job.options);
                    await delay(1500);
                }
                queueRunning = false;
            }

            function delay(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }

            async function fetchBarcode(accountId, options = {}) {
                const card = document.getElementById(`card-${accountId}`);
                const img = card.querySelector(`img[data-id="${accountId}"]`);
                const loader = card.querySelector('.loader');
                const placeholder = card.querySelector('.barcode-placeholder');
                const timerEl = card.querySelector('.timer');
                const statusEl = card.querySelector('.status');
                const button = card.querySelector('.btn');
                const preserveDisplay = Boolean(options.preserveDisplay && img.dataset.objectUrl);

                if (!preserveDisplay && img.dataset.timerId) {
                    clearInterval(parseInt(img.dataset.timerId));
                    delete img.dataset.timerId;
                }
                if (!preserveDisplay && img.dataset.objectUrl) {
                    URL.revokeObjectURL(img.dataset.objectUrl);
                    delete img.dataset.objectUrl;
                }

                if (!preserveDisplay) {
                    img.classList.add('hidden');
                    placeholder.classList.add('hidden');
                    timerEl.textContent = '';
                }
                loader.classList.remove('hidden');
                button.disabled = true;
                statusEl.textContent = options.auto ? '자동 갱신 중입니다...' : '바코드를 실시간으로 생성 중입니다...';

                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 55000);
                    const response = await fetch(`/api/get_barcode?id=${accountId}&t=${Date.now()}`, {
                        cache: 'no-store',
                        signal: controller.signal
                    });
                    clearTimeout(timeoutId);
                    if (response.status === 423) {
                        const retryAfter = Math.max(10, parseInt(response.headers.get('Retry-After') || '20', 10));
                        loader.classList.add('hidden');
                        if (!preserveDisplay) {
                            img.classList.add('hidden');
                            placeholder.classList.remove('hidden');
                            placeholder.textContent = '다른 바코드가 갱신 중입니다. 잠시 후 자동 재시도합니다.';
                        }
                        statusEl.textContent = `${retryAfter}초 후 다시 시도합니다.`;
                        setTimeout(() => enqueueBarcode(accountId, {
                            auto: options.auto,
                            manual: options.manual,
                            preserveDisplay: true
                        }), retryAfter * 1000);
                        return;
                    }
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }
                    const blob = await response.blob();
                    if (!blob.type.startsWith('image/')) {
                        throw new Error('이미지 응답이 아닙니다');
                    }
                    const objectUrl = URL.createObjectURL(blob);
                    const secondsLeft = parseInt(response.headers.get('X-Barcode-Seconds-Left') || '', 10) || BARCODE_VALID_TIME;
                    const barcodeNumber = response.headers.get('X-Barcode-Number') || '';

                    if (img.dataset.timerId) {
                        clearInterval(parseInt(img.dataset.timerId));
                        delete img.dataset.timerId;
                    }
                    if (img.dataset.objectUrl) {
                        URL.revokeObjectURL(img.dataset.objectUrl);
                    }
                    delete img.dataset.refreshQueued;
                    img.dataset.objectUrl = objectUrl;
                    img.src = objectUrl;
                    img.classList.remove('hidden');
                    placeholder.classList.add('hidden');
                    loader.classList.add('hidden');
                    statusEl.textContent = barcodeNumber ? `바코드가 생성되었습니다. (${barcodeNumber})` : '바코드가 생성되었습니다.';
                    startTimer(accountId, secondsLeft);
                } catch (error) {
                    loader.classList.add('hidden');
                    if (!preserveDisplay) {
                        img.classList.add('hidden');
                        placeholder.classList.remove('hidden');
                    }
                    placeholder.textContent = error.name === 'AbortError'
                        ? '생성 시간이 초과되었습니다. 다시 시도해주세요.'
                        : '오류가 발생했습니다. 다시 시도해주세요.';
                    statusEl.textContent = error.name === 'AbortError' ? '요청 시간 초과' : String(error.message || error);
                } finally {
                    button.disabled = false;
                }
            }

            function startTimer(accountId, duration) {
                const card = document.getElementById(`card-${accountId}`);
                const img = card.querySelector(`img[data-id="${accountId}"]`);
                const timerEl = card.querySelector('.timer');
                const statusEl = card.querySelector('.status');

                let timeLeft = Math.max(1, duration);

                const updateTimer = () => {
                    const minutes = Math.floor(timeLeft / 60);
                    const seconds = timeLeft % 60;
                    timerEl.textContent = `남은 시간: ${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;

                    if (--timeLeft < 0) {
                        clearInterval(timerId);
                        delete img.dataset.timerId;
                        if (img.dataset.refreshQueued !== '1') {
                            img.dataset.refreshQueued = '1';
                            statusEl.textContent = '20분이 지나 자동 갱신 중입니다.';
                            enqueueBarcode(accountId, { auto: true, preserveDisplay: true });
                        }
                    }
                };

                updateTimer();
                const timerId = setInterval(updateTimer, 1000);
                img.dataset.timerId = timerId.toString();
            }
        });
    </script>
</body>
</html>
